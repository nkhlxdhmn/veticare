services:
  - type: web
    name: veticare-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: VetiCare API
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: API_V1_PREFIX
        value: /api/v1
      - key: CORS_ORIGINS
        value: '["https://veticare-seven.vercel.app", "https://veticare.vercel.app"]'
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: VETICARE_SUPABASE_URL
        sync: false
      - key: VETICARE_SUPABASE_KEY
        sync: false
      # MODEL_PATH removed — path is resolved automatically from __file__
