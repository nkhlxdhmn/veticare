version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: veticare_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: veticare
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: veticare_fastapi
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    depends_on:
      - db
    volumes:
      - .:/workspace

volumes:
  postgres_data:
