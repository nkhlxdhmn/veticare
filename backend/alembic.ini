# A generic, single database configuration for Alembic

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names
file_template = %%(year)d_%%(month)02d_%%(day)02d_%%(hour)02d%%(minute)02d-%%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
timezone = UTC

# max length of characters to write to the "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow empty revisions to be created
# write_empty = false

# version table name
version_locations = %(here)s/alembic/versions

# database connection url - loaded dynamically in env.py, but standard template included here
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/veticare

[post_write_hooks]
# post_write_hooks defines scripts or cleanup that runs after migrations are generated.
# Example: formatter = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[logger_root]
level = INFO
handlers = console

[logger_sqlalchemy]
level = WARN
qualname = sqlalchemy.engine
handlers =

[logger_alembic]
level = INFO
qualname = alembic
handlers =

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatters]
keys = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
