name: Backend CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt mypy
      - run: ruff check app/main.py app/config app/core app/database app/middleware app/schemas/system.py tests
      - run: pytest
      - run: mypy app/main.py app/config app/core app/database app/middleware --ignore-missing-imports
      - run: docker build -t veticare-api .
